version: '3.8'

services:
  # 1. Database
  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: shoplane_user
      POSTGRES_PASSWORD: shoplane_pass
      POSTGRES_DB: shoplane_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # 2. Backend (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://shoplane_user:shoplane_pass@db:5432/shoplane_db
    env_file:
      - ./backend/.env
    # override DATABASE_URL to use docker internal hostname 'db'
    depends_on:
      - db
    volumes:
      - ./backend/uploads:/app/uploads
    restart: always

  # 3. Frontend (React with Static Server)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always

  # 4. Reverse Proxy & Master Load Balancer
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: always

volumes:
  postgres_data:
